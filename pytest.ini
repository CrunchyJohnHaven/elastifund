[pytest]
addopts = --import-mode=importlib
pythonpath =
    .
    edge-backlog
testpaths =
    backtest/tests
    data_layer/tests
    hub/tests
    nontrading/tests
    orchestration/tests
    simulator/tests
    tests
    edge-backlog/tests
    bot/tests
norecursedirs =
    .git
    .hg
    .mypy_cache
    .pytest_cache
    .ruff_cache
    __pycache__
    .venv
    venv
    node_modules
    build
    dist
    archive
    snapshots
    polymarket-bot
