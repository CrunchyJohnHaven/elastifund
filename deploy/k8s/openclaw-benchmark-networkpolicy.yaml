apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openclaw-benchmark-networkpolicy
  namespace: openclaw-benchmark
spec:
  podSelector:
    matchLabels:
      app: openclaw-benchmark
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - ports:
        - protocol: TCP
          port: 443
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 4318
