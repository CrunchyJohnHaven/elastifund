apiVersion: apps/v1
kind: Deployment
metadata:
  name: elastifund-gateway
  namespace: elastifund
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elastifund-gateway
  template:
    metadata:
      labels:
        app: elastifund-gateway
    spec:
      containers:
        - name: gateway
          image: elastifund-gateway:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: HUB_ENV
              value: cluster
            - name: ELASTICSEARCH_URL
              value: http://elasticsearch:9200
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
---
apiVersion: v1
kind: Service
metadata:
  name: elastifund-gateway
  namespace: elastifund
spec:
  selector:
    app: elastifund-gateway
  ports:
    - name: http
      port: 8000
      targetPort: 8000
