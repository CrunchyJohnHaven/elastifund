name: Feature request
description: Propose a focused improvement to the repo, docs, or runtime.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is painful, confusing, or missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who benefits, and how would we know the change worked?
