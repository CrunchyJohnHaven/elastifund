name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  root:
    name: Root Hygiene And Tests
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            hub/requirements.txt
            edge-backlog/pyproject.toml
      - name: Install dependencies
        run: make bootstrap
      - name: Doctor
        run: make doctor
      - name: Quickstart smoke
        run: python3 scripts/quickstart.py --prepare-only --agent-name ci-smoke
      - name: Hygiene
        run: make hygiene
      - name: Routing and reports contract checks
        run: python3 -m pytest -q tests/test_select_test_targets.py tests/test_reports_layout_contract.py tests/test_reports_top_level_symlink_collapse.py tests/test_reports_top_level_symlink_prune.py tests/test_reports_symlink_collapse.py
      - name: Root regression suite
        shell: bash
        run: |
          set -euo pipefail
          export PYTEST_ADDOPTS="${PYTEST_ADDOPTS:-} -x --tb=short -ra"
          if ! python3 -u scripts/run_root_tests.py 2>&1 | tee root-regression.log; then
            python3 -c 'from pathlib import Path; tail = Path("root-regression.log").read_text(encoding="utf-8", errors="ignore").splitlines()[-40:]; esc = lambda value: value.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A"); print(f"::error title=Root regression suite failed::{esc(chr(10).join(tail))}")'
            exit 1
          fi
      - name: Upload root regression log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: root-regression-log
          path: root-regression.log

  polymarket:
    name: Polymarket Bot Tests
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            hub/requirements.txt
            polymarket-bot/pyproject.toml
            edge-backlog/pyproject.toml
      - name: Install dependencies
        run: make bootstrap
      - name: Polymarket regression suite
        shell: bash
        run: |
          set -euo pipefail
          cd polymarket-bot
          python3 -m pytest tests -q --cov=src --cov-report=term-missing 2>&1 | tee ../polymarket-regression.log
      - name: Upload polymarket regression log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: polymarket-regression-log
          path: polymarket-regression.log
