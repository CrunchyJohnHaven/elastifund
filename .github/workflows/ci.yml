name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  root:
    name: Root Hygiene And Tests
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            hub/requirements.txt
            edge-backlog/pyproject.toml
      - name: Install dependencies
        run: make bootstrap
      - name: Doctor
        run: make doctor
      - name: Quickstart smoke
        run: python3 scripts/quickstart.py --prepare-only --agent-name ci-smoke
      - name: Hygiene
        run: make hygiene
      - name: Routing and reports contract checks
        run: python3 -m pytest -q tests/test_select_test_targets.py tests/test_reports_layout_contract.py tests/test_reports_top_level_symlink_collapse.py tests/test_reports_top_level_symlink_prune.py tests/test_reports_symlink_collapse.py
      - name: Fastpath verification
        run: make verify-fastpath
      - name: Targeted runtime execution regressions
        run: python3 -m pytest -q tests/test_jj_live_sum_violation.py tests/test_config_runtime_profile_overrides.py bot/tests/test_btc_5min_maker_core_executor.py bot/tests/test_btc_5min_maker_primitives.py::test_place_post_only_buy_fails_closed_when_post_only_unsupported

  polymarket:
    name: Polymarket Bot Tests
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            hub/requirements.txt
            polymarket-bot/pyproject.toml
            edge-backlog/pyproject.toml
      - name: Install dependencies
        run: make bootstrap
      - name: Polymarket regression suite
        shell: bash
        run: |
          set -euo pipefail
          cd polymarket-bot
          python3 -m pytest tests -q --cov=src --cov-report=term-missing 2>&1 | tee ../polymarket-regression.log
      - name: Upload polymarket regression log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: polymarket-regression-log
          path: polymarket-regression.log
