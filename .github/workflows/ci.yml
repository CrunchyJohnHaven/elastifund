name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  root:
    name: Root Hygiene And Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            hub/requirements.txt
            edge-backlog/pyproject.toml
      - name: Install dependencies
        run: make bootstrap
      - name: Doctor
        run: make doctor
      - name: Quickstart smoke
        run: python3 scripts/quickstart.py --prepare-only --agent-name ci-smoke
      - name: Hygiene
        run: make hygiene
      - name: Root regression suite
        shell: bash
        run: |
          set -euo pipefail
          export PYTEST_ADDOPTS="${PYTEST_ADDOPTS:-} -x --tb=short -ra"
          if ! python3 -u scripts/run_root_tests.py 2>&1 | tee root-regression.log; then
            python3 - <<'PY'
            from pathlib import Path


            def escape(value: str) -> str:
                return value.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")


            tail = Path("root-regression.log").read_text(encoding="utf-8", errors="ignore").splitlines()[-40:]
            message = escape("\n".join(tail))
            print(f"::error title=Root regression suite failed::{message}")
            PY
            exit 1
          fi
      - name: Upload root regression log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: root-regression-log
          path: root-regression.log

  polymarket:
    name: Polymarket Bot Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            hub/requirements.txt
            polymarket-bot/pyproject.toml
            edge-backlog/pyproject.toml
      - name: Install dependencies
        run: make bootstrap
      - name: Polymarket regression suite
        shell: bash
        run: |
          set -euo pipefail
          make test-polymarket 2>&1 | tee polymarket-regression.log
      - name: Upload polymarket regression log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: polymarket-regression-log
          path: polymarket-regression.log
