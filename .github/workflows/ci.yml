name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  root:
    name: Root Hygiene And Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            hub/requirements.txt
            edge-backlog/pyproject.toml
      - name: Install dependencies
        run: make bootstrap
      - name: Doctor
        run: make doctor
      - name: Quickstart smoke
        run: python3 scripts/quickstart.py --prepare-only --agent-name ci-smoke
      - name: Hygiene
        run: make hygiene
      - name: Root regression suite
        run: make test

  polymarket:
    name: Polymarket Bot Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            hub/requirements.txt
            polymarket-bot/pyproject.toml
            edge-backlog/pyproject.toml
      - name: Install dependencies
        run: make bootstrap
      - name: Polymarket regression suite
        run: make test-polymarket
