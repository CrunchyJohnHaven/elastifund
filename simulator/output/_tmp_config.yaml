capital:
  initial: 75.0
execution:
  max_concurrent_positions: 50
  min_edge_threshold: 0.05
  mode: maker
fees:
  maker_rate: 0.0
  taker_rate: 0.02
  winner_fee: 0.02
fill_model:
  maker:
    base_fill_probability: 0.55
    distance_decay: 2.0
    min_fill_probability: 0.1
    price_improvement_bps: 0
  spreads:
    default:
      half_spread_cents: 5.0
      min_liquidity: 500
    high_volume:
      half_spread_cents: 1.5
      min_liquidity: 10000
    international:
      half_spread_cents: 20.0
      min_liquidity: 500
    niche:
      half_spread_cents: 22.0
      min_liquidity: 100
    us_weather:
      half_spread_cents: 7.0
      min_liquidity: 2000
  taker:
    base_slippage_bps: 50
    fill_probability: 1.0
    liquidity_impact_factor: 0.001
    size_impact_bps_per_dollar: 2
filters:
  min_liquidity: 500
  min_volume: 1000
  price_range:
  - 0.1
  - 0.9
random_seed: 42
sizing:
  capped:
    max_position_usd: 5.0
    min_position_usd: 1.0
  fixed_fraction:
    fraction: 0.027
  kelly:
    kelly_fraction: 0.25
    max_allocation: 0.2
    min_size: 1.0
  method: fixed_fraction
